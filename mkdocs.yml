site_name: PDLC
site_description: Product Development Lifecycle — the specification for defining a product and handing it to a builder
site_url: https://productbuildershq.com/pdlc
repo_url: https://github.com/ProductBuildersHQ/pdlc
repo_name: ProductBuildersHQ/pdlc

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Specification:
      - Lifecycle: specification/lifecycle.md
      - Project Layout: specification/project-layout.md
      - Review Site: specification/review-site.md
      - Requirements & Acceptance: specification/requirements-acceptance.md
      - Quality: specification/quality.md
      - Handoff: specification/handoff.md
      - Adoption: specification/adoption.md
  - Releases:
      - v0.1.0: releases/v0.1.0.md
