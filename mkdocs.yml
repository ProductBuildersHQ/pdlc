site_name: PDLC
site_description: Product Development Lifecycle — the specification for defining a product and handing it to a builder
site_url: https://productbuildershq.com/pdlc
repo_url: https://github.com/ProductBuildersHQ/pdlc
repo_name: ProductBuildersHQ/pdlc

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Light mode first (ProductBuildersHQ default)
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

# ProductBuildersHQ Theme Assets (served from main site)
extra_css:
  - https://productbuildershq.com/css/productbuildershq-mkdocs.css

extra_javascript:
  - https://productbuildershq.com/js/site-nav.min.js
  - https://productbuildershq.com/js/pbhq-nav.js

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Specification:
      - Lifecycle: specification/lifecycle.md
      - Project Layout: specification/project-layout.md
      - Review Site: specification/review-site.md
      - Requirements & Acceptance: specification/requirements-acceptance.md
      - Quality: specification/quality.md
      - Handoff: specification/handoff.md
      - Adoption: specification/adoption.md
  - Releases:
      - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ProductBuildersHQ/pdlc
