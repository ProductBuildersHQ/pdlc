version: "2"
run:
  go: "1.26"
linters:
  enable:
    - dogsled
    - dupl
    - gosec
    - misspell
    - nakedret
    - staticcheck
    - unconvert
    - unparam
    - whitespace
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
  settings:
    staticcheck:
      checks:
        - "-QF1008" # Disable the "could remove embedded field" check
    gosec:
      excludes:
        # G306: this module writes project artifacts (pdlc.yaml, readiness
        # reports) that are committed and read by CI, other tools, and
        # teammates. 0644 is correct for them; they hold no secrets.
        - G306
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
